<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lar Aumigo</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background-color: #f8f9fa;
      color: #333;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1, h2, h3 {
      color: #1e3a8a;
    }

    .section {
      margin-bottom: 40px;
      padding-bottom: 30px;
      border-bottom: 1px solid #e5e5e5;
  
    }

    .animal-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .animal-card {
      border-radius: 12px;
      padding: 15px;
      background-color: white;
      width: 240px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

.animal-card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 8px;
}
    
    .animal-card:hover {
      transform: translateY(-5px);
      transition: 0.3s;
    }
.animal-card p {
  margin: 5px 0;
  font-size: 14px;
}
    .animal-card h3 {
      margin: 10px 0 5px;
      font-size: 18px;
      color: #1e3a8a;
      font-weight: bold;
    }
    
    button {
      background-color: #2563eb;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
      font-weight: bold;
      transition: all 0.3s ease;
    }

button {
  background-color: #2563eb;
  color: white;
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
  width: 100%;
  font-weight: bold;
  transition: all 0.3s ease;
}

button:hover {
  background-color: #1e40af;
}
    
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 600px;

      background-color: #ffffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-top: 4px solid #6c63ff;
    }

    input, textarea, select {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .frase {
      color: #2563eb;
      cursor: pointer;
      text-decoration: underline;
    }

    .frase:hover {
      color: #1e40af;
    }

    footer {
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div class="container">

<header>
  <h1>Lar Amigo 🐾</h1>
  <p>Organização dedicada ao resgate e cuidado de cães e gatos.</p>
</header>

<section class="section">
  <h2>Animais para Adoção</h2>

  <!-- AGORA VEM DA API -->
  <div class="animal-container" id="lista-pets"></div>

</section>

<section class="section">
  <h2><span class="frase" onclick="toggleFormulario('formAdotar')">Formulário de adoção</span></h2>

  <div id="formAdotar" style="display:none;">
    <form onsubmit="enviarFormulario(event)">
      
      <label>Nome:
        <input type="text" required>
      </label>

      <label>Email:
        <input type="email" required>
      </label>

      <label>Qual pet deseja?
        <select id="petSelecionado"></select>
      </label>

      <button type="submit">Enviar</button>

    </form>
  </div>
</section>

<footer>
  <p><strong>Transforme uma vida hoje 🐶</strong></p>
</footer>

</div>

<script>
  function toggleFormulario(id) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === "none" ? "block" : "none";
  }

  function abrirAdocao(nome) {
    toggleFormulario('formAdotar');
    document.getElementById('petSelecionado').value = nome;
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function enviarFormulario(e) {
    e.preventDefault();
    alert("Formulário enviado com sucesso! 🐾");
  }

  // 🔥 CONSUMINDO A API
  fetch("http://localhost:3000/pets")
    .then(response => response.json())
    .then(data => {
      const lista = document.getElementById("lista-pets");
      const select = document.getElementById("petSelecionado");

      lista.innerHTML = "";
      select.innerHTML = "";

      data.forEach(pet => {
        // cria card
        const div = document.createElement("div");
        div.classList.add("animal-card");

      div.innerHTML = `
  <img src="${pet.imagem}" alt="${pet.nome}" />

  <h3>${pet.nome}</h3>

  <p><strong>Idade:</strong> ${pet.idade} anos</p>
  <p><strong>Porte:</strong> ${pet.porte}</p>

  <p>${pet.descricao}</p>

  <button onclick="abrirAdocao('${pet.nome}')">
    Quero adotar
  </button>
`;

        lista.appendChild(div);

        // adiciona no select do formulário
        const option = document.createElement("option");
        option.value = pet.nome;
        option.textContent = pet.nome;
        select.appendChild(option);
      });
    })
    .catch(error => console.error(error));
</script>

</body>
</html>
